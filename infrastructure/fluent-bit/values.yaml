config:
  service: |
    [SERVICE]
        Flush          1
        Daemon         Off
        Log_Level      info

        HTTP_Server    On
        HTTP_Listen    0.0.0.0
        HTTP_PORT      2020

  inputs: |
    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        Tag               kube.*
        multiline.parser  docker, cri
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Merge_Log           On
        Keep_Log            Off
        Kube_Tag_Prefix     kube.var.log.containers.

  outputs: |
    [OUTPUT]
        Name          loki
        Match         *
        Host          loki-gateway.monitoring.svc.cluster.local
        Port          80
        Labels        job=fluent-bit
        Auto_Kubernetes_Labels on
